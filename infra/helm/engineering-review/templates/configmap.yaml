apiVersion: v1
kind: ConfigMap
metadata:
  name: erp-config
  namespace: {{ .Values.namespace }}
data:
  OLLAMA_HOST: {{ .Values.ollama.host | quote }}
  OLLAMA_PRIMARY_MODEL: "qwen2.5-coder:7b"
  OLLAMA_SYNTHESIS_MODEL: "mistral:7b"
  OLLAMA_EMBEDDING_MODEL: "nomic-embed-text"
  OLLAMA_REVIEWER_MODEL: "reviewer-model"
  CHROMA_HOST: "chromadb"
  CHROMA_PORT: "8000"
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USER: "neo4j"
  MINIO_ENDPOINT: "minio:9000"
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
