apiVersion: v1
kind: Secret
metadata:
  name: erp-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | default "changeme" | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | default "changeme" | quote }}
  CHROMA_TOKEN: {{ .Values.secrets.chromaToken | default "changeme" | quote }}
  NEO4J_PASSWORD: {{ .Values.secrets.neo4jPassword | default "changeme" | quote }}
  MINIO_USER: {{ .Values.secrets.minioUser | default "minioadmin" | quote }}
  MINIO_PASSWORD: {{ .Values.secrets.minioPassword | default "changeme" | quote }}
  SECRET_KEY: {{ .Values.secrets.secretKey | default "changeme" | quote }}
